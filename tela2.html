<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELA 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body style="margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;">
    <main style="height: 100%; width: 100%;">
        <div class="row m-0" style="height: 100vh;">
            <!--Primeira div com a imagem geral, chamando a função bigImage-->
            <div class="col-8 d-flex justify-content-center align-items-center bigImage" style="height: 100%;"></div>
            <!--Segunda div com a cor roxo escuro, chamando a função bigImage2-->
            <div class="col bigImage2">
                <!--div dentro da segunda div para colocar a logo no topo-->
                <div class="d-flex flex-column">
                    <img src="https://app.rocketseat.com.br/assets/logos/rocketseat-logo.svg" alt="" style="height: 202; width: 20 decoding: async">
                </div>
            </div>
        </div>
    </main>

    <style>
        .bigImage {
            /* Garantir que o fundo sólido seja a cor de fundo inicial */
            background-color: #1A1a24;
            
            /* Agora, adicionar a imagem de fundo */
            background-image: url("https://app.rocketseat.com.br/assets/images/backgrounds/auth.webp");
            
            /* Garantir que a imagem de fundo seja centralizada e cubra a área da div */
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            
            /* Garantir que a div ocupe 100% da altura do container */
            height: 100%;  
        }

        .bigImage2 {
            /* Garantir que o fundo sólido seja a cor de fundo inicial */
            background-color: #1A1a24;
        }
    </style>
</body>
</html>
